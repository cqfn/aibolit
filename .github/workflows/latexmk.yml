---
# yamllint disable rule:line-length
name: latexmk
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  latexmk:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'true'
      - uses: yegor256/latexmk-action@0.20.0
        with:
          path: wp
          opts: -pdf
          before: |
            tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet
            tlmgr --verify-repo=none install $(cut -d ' ' -f2 ../DEPENDS.txt | sort -u)
            fmtutil-sys --all
      - run: |
          mkdir gh-pages
          cp wp/wp.pdf gh-pages
      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: gh-pages
          clean: false
        if: github.ref == 'refs/heads/master'
